<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16a34a" />
  <title>DukaPOS - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
        "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(135deg, #f5f5f5 0%, #efefef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #eff6ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    h1 {
      color: #16a34a;
      font-size: 1.875rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .status {
      color: #ef4444;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-retry {
      background: #16a34a;
      color: white;
    }

    .btn-retry:hover {
      background: #15803d;
      box-shadow: 0 2px 4px rgba(22, 163, 74, 0.2);
    }

    .btn-home {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-home:hover {
      background: #e8e8e8;
    }

    .tips {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      text-align: left;
      font-size: 0.85rem;
      color: #999;
    }

    .tips strong {
      color: #666;
      display: block;
      margin-bottom: 0.5rem;
    }

    .tips li {
      margin-bottom: 0.4rem;
      margin-left: 1.2rem;
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .icon {
        width: 60px;
        height: 60px;
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>You're Offline</h1>
    <div class="status">No internet connection</div>
    <p>
      Please check your internet connection to process M-Pesa payments and access your account.
    </p>

    <div class="buttons">
      <button class="btn-retry" onclick="window.location.reload()">
        Retry Connection
      </button>
      <button class="btn-home" onclick="window.location.href='/'">
        Go to Home
      </button>
    </div>

    <div class="tips">
      <strong>What you can try:</strong>
      <ul>
        <li>Check your Wi-Fi or mobile data connection</li>
        <li>Move closer to your router</li>
        <li>Restart your device's internet</li>
        <li>Close and reopen DukaPOS</li>
      </ul>
    </div>
  </div>

  <script>
    // Check if connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Auto-retry every 30 seconds
    setInterval(() => {
      fetch('/ping', { method: 'HEAD', cache: 'no-store' })
        .then(() => window.location.reload())
        .catch(() => {});
    }, 30000);
  </script>
</body>
</html>
