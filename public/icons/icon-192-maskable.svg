<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dukapos-icon { fill: #16a34a; }
    </style>
  </defs>
  
  <!-- Till/POS icon centered for maskable icon (will be contained within safe zone) -->
  <g transform="translate(30, 30)">
    <!-- Till machine body -->
    <rect class="dukapos-icon" x="12" y="20" width="72" height="60" rx="4"/>
    
    <!-- Screen -->
    <rect fill="#ffffff" opacity="0.8" x="18" y="26" width="60" height="24" rx="2"/>
    
    <!-- Number pad -->
    <g font-family="Arial" font-size="8" font-weight="bold" text-anchor="middle">
      <text class="dukapos-icon" x="25" y="60">1</text>
      <text class="dukapos-icon" x="45" y="60">2</text>
      <text class="dukapos-icon" x="65" y="60">3</text>
      <text class="dukapos-icon" x="25" y="74">4</text>
      <text class="dukapos-icon" x="45" y="74">5</text>
      <text class="dukapos-icon" x="65" y="74">6</text>
    </g>
  </g>
</svg>
