<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .dukapos-icon { fill: #16a34a; }
    </style>
  </defs>
  
  <!-- Till/POS icon centered for maskable icon (will be contained within safe zone) -->
  <g transform="translate(80, 80)">
    <!-- Till machine body -->
    <rect class="dukapos-icon" x="32" y="50" width="192" height="160" rx="12"/>
    
    <!-- Screen -->
    <rect fill="#ffffff" opacity="0.8" x="48" y="70" width="160" height="60" rx="6"/>
    
    <!-- Amount display -->
    <text x="128" y="105" font-family="Arial" font-size="32" font-weight="bold" text-anchor="middle" fill="#16a34a">0</text>
    
    <!-- Number pad -->
    <g font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">
      <!-- Row 1 -->
      <circle class="dukapos-icon" cx="60" cy="155" r="16"/>
      <text x="60" y="162" fill="#ffffff">1</text>
      
      <circle class="dukapos-icon" cx="128" cy="155" r="16"/>
      <text x="128" y="162" fill="#ffffff">2</text>
      
      <circle class="dukapos-icon" cx="196" cy="155" r="16"/>
      <text x="196" y="162" fill="#ffffff">3</text>
      
      <!-- Row 2 -->
      <circle class="dukapos-icon" cx="60" cy="195" r="16"/>
      <text x="60" y="202" fill="#ffffff">4</text>
      
      <circle class="dukapos-icon" cx="128" cy="195" r="16"/>
      <text x="128" y="202" fill="#ffffff">5</text>
      
      <circle class="dukapos-icon" cx="196" cy="195" r="16"/>
      <text x="196" y="202" fill="#ffffff">6</text>
    </g>
  </g>
</svg>
